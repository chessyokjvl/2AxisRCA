<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JVL RCA System</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', Arial, sans-serif; background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%); padding: 20px; }
.container { max-width: 1200px; margin: 0 auto; }
.card { background: white; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); padding: 24px; margin-bottom: 20px; }
h1 { color: #1e40af; font-size: 28px; margin-bottom: 8px; }
h2 { color: #1e40af; font-size: 20px; margin-bottom: 16px; }
h3 { color: #1e40af; font-size: 16px; margin-bottom: 12px; }
.subtitle { color: #6b7280; margin-bottom: 20px; }
.btn { padding: 10px 20px; border: none; border-radius: 8px; cursor: pointer; font-size: 14px; font-weight: 500; transition: all 0.3s; }
.btn:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.15); }
.btn-primary { background: #3b82f6; color: white; }
.btn-primary:hover { background: #2563eb; }
.btn-success { background: #10b981; color: white; }
.btn-success:hover { background: #059669; }
.btn-warning { background: #f59e0b; color: white; }
.btn-warning:hover { background: #d97706; }
.btn-danger { background: #ef4444; color: white; }
.btn-danger:hover { background: #dc2626; }
.btn-purple { background: #8b5cf6; color: white; }
.btn-purple:hover { background: #7c3aed; }
.form-group { margin-bottom: 16px; }
label { display: block; font-weight: 600; margin-bottom: 6px; color: #374151; font-size: 14px; }
input[type="text"], input[type="date"], textarea, select { width: 100%; padding: 10px; border: 1px solid #d1d5db; border-radius: 6px; font-size: 14px; }
input:focus, textarea:focus, select:focus { outline: none; border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
textarea { resize: vertical; }
.checkbox-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.checkbox-label { display: flex; align-items: center; padding: 8px 12px; border: 2px solid #e5e7eb; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
.checkbox-label:hover { background: #f9fafb; }
.checkbox-label.checked { border-color: #f59e0b; background: #fef3c7; }
.checkbox-label input { margin-right: 8px; }
.flow-item { border: 3px solid #3b82f6; border-radius: 12px; padding: 20px; margin: 16px 0; background: #eff6ff; }
.flow-header { background: linear-gradient(135deg, #3b82f6, #2563eb); color: white; padding: 16px; border-radius: 8px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.unsafe-act { background: #fef3c7; border-left: 4px solid #f59e0b; padding: 16px; margin: 12px 0; border-radius: 8px; }
.unsafe-header { background: #fde68a; padding: 12px; border-radius: 6px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; cursor: pointer; }
.factor-item { background: white; border: 2px solid #e5e7eb; border-radius: 8px; padding: 16px; margin: 12px 0; }
.tier-badge { display: inline-block; padding: 6px 12px; border-radius: 20px; color: white; font-size: 12px; font-weight: 600; margin-bottom: 8px; }
.tier-1 { background: #3b82f6; }
.tier-2 { background: #10b981; }
.tier-3 { background: #f59e0b; }
.tier-4 { background: #ef4444; }
.barrier-tag { display: inline-block; background: #fee2e2; color: #991b1b; padding: 4px 10px; border-radius: 4px; margin: 2px; font-size: 12px; }
.solution-box { background: #f0fdf4; border-left: 3px solid #10b981; padding: 12px; margin-top: 8px; border-radius: 4px; }
.hidden { display: none; }
.btn-group { display: flex; gap: 8px; flex-wrap: wrap; }
.stats { display: flex; gap: 20px; margin: 16px 0; font-size: 14px; color: #6b7280; }
.stats span { font-weight: 600; color: #1f2937; }
.form-popup { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 24px; border-radius: 12px; box-shadow: 0 20px 25px -5px rgba(0,0,0,0.3); z-index: 1000; max-width: 600px; width: 90%; max-height: 90vh; overflow-y: auto; }
.overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); z-index: 999; }
.grid-2 { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; }
.grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 12px; }
@media (max-width: 768px) {
  .grid-2, .grid-4, .checkbox-grid { grid-template-columns: 1fr; }
  .stats { flex-direction: column; gap: 8px; }
}
</style>
</head>
<body>

<div class="container">
  <div class="card">
    <h1>JVL - 2 Axis Swiss cheese with 4-Tier RCA Model</h1>
    <p class="subtitle">ระบบบริหารความเสี่ยง โรงพยาบาลจิตเวชเลยราชนครินทร์</p>
    <div class="stats" id="stats">
      <div>📋 Flow of Steps: <span id="flowCount">0</span></div>
      <div>⚠️ Unsafe Acts: <span id="actCount">0</span></div>
      <div>🎯 Factors: <span id="factorCount">0</span></div>
    </div>
    <div class="btn-group">
      <button class="btn btn-success" onclick="exportExcel()" id="exportExcelBtn" style="display:none">📊 Export Excel</button>
      <button class="btn btn-primary" onclick="exportHTML()" id="exportHTMLBtn" style="display:none">📄 Export HTML</button>
      <button class="btn btn-purple" onclick="visualizeDiagram()" id="visualizeBtn" style="display:none">🎨 Visualize</button>
    </div>
  </div>

  <div class="card">
    <h2>ข้อมูลการวิเคราะห์ RCA</h2>
    <div class="grid-2">
      <div class="form-group">
        <label>เลขที่ใบอุบัติการณ์ความเสี่ยง</label>
        <input type="text" id="incidentNumber">
      </div>
      <div class="form-group">
        <label>ระดับความรุนแรง</label>
        <div class="checkbox-grid" id="severityLevel"></div>
      </div>
    </div>
    <div class="form-group">
      <label>รายการความเสี่ยง</label>
      <textarea id="riskDescription" rows="2"></textarea>
    </div>
    <div class="grid-2">
      <div class="form-group">
        <label>วันที่เกิดเหตุ</label>
        <input type="date" id="incidentDate">
      </div>
      <div class="form-group">
        <label>วันที่วิเคราะห์ RCA</label>
        <input type="date" id="analysisDate">
      </div>
      <div class="form-group">
        <label>หน่วยงานที่ร่วมวิเคราะห์ RCA</label>
        <input type="text" id="departments">
      </div>
      <div class="form-group">
        <label>ผู้เข้าร่วมวิเคราะห์ RCA</label>
        <input type="text" id="participants">
      </div>
    </div>
  </div>

  <div id="flowsContainer"></div>

  <div class="card">
    <button class="btn btn-primary" onclick="openFlowForm()">➕ เพิ่ม Flow of Step</button>
  </div>
</div>

<div id="overlay" class="overlay hidden" onclick="closeAllForms()"></div>
<div id="formContainer"></div>

<script>
var data = { flows: [], rcaInfo: { severityLevel: [] } };

function init() {
  var levels = ['A','B','C','D','E','F','G','H','I'];
  var html = '';
  for (var i = 0; i < levels.length; i++) {
    html += '<label class="checkbox-label" id="sev' + levels[i] + '" onclick="toggleSeverity(\'' + levels[i] + '\')">';
    html += '<input type="checkbox" value="' + levels[i] + '"> <span>' + levels[i] + '</span></label>';
  }
  document.getElementById('severityLevel').innerHTML = html;
  updateStats();
}

function toggleSeverity(level) {
  var idx = data.rcaInfo.severityLevel.indexOf(level);
  if (idx > -1) {
    data.rcaInfo.severityLevel.splice(idx, 1);
    document.getElementById('sev' + level).classList.remove('checked');
  } else {
    data.rcaInfo.severityLevel.push(level);
    document.getElementById('sev' + level).classList.add('checked');
  }
}

function updateStats() {
  var actCount = 0, factorCount = 0;
  for (var i = 0; i < data.flows.length; i++) {
    actCount += data.flows[i].acts.length;
    for (var j = 0; j < data.flows[i].acts.length; j++) {
      factorCount += data.flows[i].acts[j].factors.length;
    }
  }
  document.getElementById('flowCount').textContent = data.flows.length;
  document.getElementById('actCount').textContent = actCount;
  document.getElementById('factorCount').textContent = factorCount;
  
  var show = data.flows.length > 0 ? 'inline-block' : 'none';
  document.getElementById('exportExcelBtn').style.display = show;
  document.getElementById('exportHTMLBtn').style.display = show;
  document.getElementById('visualizeBtn').style.display = show;
}

function openFlowForm() {
  var html = '<div class="form-popup"><h2>เพิ่ม Flow of Step</h2>';
  html += '<div class="form-group"><label>ชื่อขั้นตอน</label>';
  html += '<input type="text" id="flowName" placeholder="เช่น การรับผู้ป่วย, การประเมินอาการ"></div>';
  html += '<div class="btn-group"><button class="btn btn-primary" onclick="saveFlow()">บันทึก</button>';
  html += '<button class="btn" onclick="closeAllForms()">ยกเลิก</button></div></div>';
  document.getElementById('formContainer').innerHTML = html;
  document.getElementById('overlay').classList.remove('hidden');
}

function saveFlow() {
  var name = document.getElementById('flowName').value;
  if (name) {
    data.flows.push({ id: Date.now(), name: name, acts: [] });
    closeAllForms();
    renderFlows();
  }
}

function closeAllForms() {
  document.getElementById('overlay').classList.add('hidden');
  document.getElementById('formContainer').innerHTML = '';
}

function renderFlows() {
  var html = '';
  for (var i = 0; i < data.flows.length; i++) {
    var flow = data.flows[i];
    html += '<div class="card flow-item"><div class="flow-header">';
    html += '<div><strong>Flow ' + (i+1) + ':</strong> ' + flow.name + ' <span style="opacity:0.8">(' + flow.acts.length + ' Unsafe Acts)</span></div>';
    html += '<button class="btn btn-danger" style="padding:6px 12px" onclick="deleteFlow(' + i + ')">🗑️</button></div>';
    
    for (var j = 0; j < flow.acts.length; j++) {
      var act = flow.acts[j];
      html += '<div class="unsafe-act"><div class="unsafe-header">';
      html += '<div><strong>Unsafe Act ' + (j+1) + ':</strong> ' + act.name + ' <span>(' + act.factors.length + ' Factors)</span></div>';
      html += '<button class="btn btn-danger" style="padding:4px 8px;font-size:12px" onclick="deleteAct(' + i + ',' + j + ')">🗑️</button></div>';
      
      for (var k = 0; k < act.factors.length; k++) {
        var factor = act.factors[k];
        html += '<div class="factor-item">';
        html += '<span class="tier-badge tier-' + factor.tier + '">Tier ' + factor.tier + '</span><br>';
        html += '<strong>สาเหตุ:</strong> ' + factor.cause + '<br>';
        if (factor.barriers && factor.barriers.length > 0) {
          html += '<strong>ด่านกั้นที่ล้มเหลว:</strong><br>';
          for (var b = 0; b < factor.barriers.length; b++) {
            html += '<span class="barrier-tag">' + factor.barriers[b] + '</span> ';
          }
        }
        if (factor.solution) {
          html += '<div class="solution-box"><strong>มาตรการแก้ไข:</strong><br>' + factor.solution + '</div>';
        }
        html += '<button class="btn btn-danger" style="padding:4px 8px;font-size:11px;margin-top:8px" onclick="deleteFactor(' + i + ',' + j + ',' + k + ')">ลบ</button>';
        html += '</div>';
      }
      
      html += '<button class="btn btn-purple" style="margin-top:8px" onclick="openFactorForm(' + i + ',' + j + ')">➕ เพิ่มปัจจัย</button>';
      html += '</div>';
    }
    
    html += '<button class="btn btn-warning" onclick="openActForm(' + i + ')">➕ เพิ่ม Unsafe Act</button></div>';
  }
  document.getElementById('flowsContainer').innerHTML = html;
  updateStats();
}

function openActForm(flowIdx) {
  var html = '<div class="form-popup"><h2>เพิ่ม Unsafe Act</h2>';
  html += '<div class="form-group"><label>รายละเอียด Unsafe Act</label>';
  html += '<textarea id="actName" rows="3" placeholder="อธิบายการกระทำหรือสถานการณ์ที่ไม่ปลอดภัย"></textarea></div>';
  html += '<div class="btn-group"><button class="btn btn-warning" onclick="saveAct(' + flowIdx + ')">บันทึก</button>';
  html += '<button class="btn" onclick="closeAllForms()">ยกเลิก</button></div></div>';
  document.getElementById('formContainer').innerHTML = html;
  document.getElementById('overlay').classList.remove('hidden');
}

function saveAct(flowIdx) {
  var name = document.getElementById('actName').value;
  if (name) {
    data.flows[flowIdx].acts.push({ name: name, factors: [] });
    closeAllForms();
    renderFlows();
  }
}

};

var currentFactorData = {flowIdx:0,actIdx:0,tier:0,group:0,cause:0,barriers:[],otherCause:'',otherBarrier:''};

function openFactorForm(flowIdx,actIdx) {
  currentFactorData = {flowIdx:flowIdx,actIdx:actIdx,tier:0,group:0,cause:0,barriers:[],otherCause:'',otherBarrier:''};
  renderFactorForm();
}

function renderFactorForm() {
  var html = '<div class="form-popup" style="max-height:85vh;overflow-y:auto"><h2>🎯 เพิ่มปัจจัย</h2>';
  
  html += '<div class="form-group"><label>1️⃣ เลือก Tier</label><div class="grid-4">';
  for(var i=0;i<rcaDatabase.tiers.length;i++){
    var t=rcaDatabase.tiers[i];
    var selected=currentFactorData.tier===t.id?' style="opacity:1;box-shadow:0 0 0 3px rgba(59,130,246,0.3)"':'';
    html+='<button class="btn tier-'+t.id+'" onclick="selectFactorTier('+t.id+')"'+selected+'>'+t.name+'<br><small>'+t.label+'</small></button>';
  }
  html+='</div></div>';
  
  if(currentFactorData.tier>0){
    html+='<div class="form-group"><label>2️⃣ เลือกกลุ่มสาเหตุ</label><div>';
    var groups=rcaDatabase.groups[currentFactorData.tier]||[];
    for(var i=0;i<groups.length;i++){
      var g=groups[i];
      var sel=currentFactorData.group===g.id?' style="background:#8b5cf6;color:white"':'';
      html+='<button class="btn" onclick="selectFactorGroup('+g.id+')" style="width:100%;margin:4px 0;text-align:left"'+sel+'>'+g.name+'</button>';
    }
    html+='</div></div>';
  }
  
  if(currentFactorData.group>0){
    html+='<div class="form-group"><label>3️⃣ เลือกสาเหตุ</label><div style="max-height:200px;overflow-y:auto">';
    var causes=rcaDatabase.causes.filter(function(c){return c.groupId===currentFactorData.group});
    for(var i=0;i<causes.length;i++){
      var c=causes[i];
      var sel=currentFactorData.cause===c.id?' style="background:#f59e0b;color:white"':'';
      html+='<button class="btn" onclick="selectFactorCause('+c.id+')" style="width:100%;margin:4px 0;text-align:left"'+sel+'><strong>'+c.thai+'</strong><br><small>'+c.en+'</small></button>';
    }
    html+='<div style="border:2px solid #f59e0b;padding:8px;margin:4px 0;border-radius:6px">';
    html+='<label style="display:flex;align-items:center;cursor:pointer"><input type="radio" name="causeType" value="other" '+(currentFactorData.cause==='other'?'checked':'')+' onchange="selectFactorCause(\'other\')" style="margin-right:8px"><strong>อื่นๆ (ระบุ)</strong></label>';
    html+='<input type="text" id="otherCauseInput" placeholder="ระบุสาเหตุอื่นๆ..." value="'+currentFactorData.otherCause+'" oninput="currentFactorData.otherCause=this.value" style="margin-top:8px;width:100%"'+(currentFactorData.cause==='other'?'':' disabled')+' />';
    html+='</div></div></div>';
  }
  
  if(currentFactorData.cause>0 || currentFactorData.cause==='other'){
    html+='<div class="form-group"><label>4️⃣ เลือกด่านกั้นที่ล้มเหลว</label><div>';
    if(currentFactorData.cause!=='other'){
      var cause=rcaDatabase.causes.find(function(c){return c.id===currentFactorData.cause});
      if(cause && cause.barriers){
        for(var i=0;i<cause.barriers.length;i++){
          var b=cause.barriers[i];
          var checked=currentFactorData.barriers.indexOf(b)>-1;
          html+='<label style="display:flex;align-items:center;padding:8px;border:2px solid '+(checked?'#ef4444':'#e5e7eb')+';background:'+(checked?'#fee2e2':'white')+';margin:4px 0;border-radius:6px;cursor:pointer">';
          html+='<input type="checkbox" '+(checked?'checked':'')+' onchange="toggleBarrier(\''+b.replace(/'/g,"\\'")+'\')" style="margin-right:8px">'+b+'</label>';
        }
      }
    }
    html+='<div style="border:2px solid #ef4444;padding:8px;margin:8px 0;border-radius:6px">';
    html+='<label style="display:flex;align-items:start;cursor:pointer"><input type="checkbox" '+(currentFactorData.otherBarrier?'checked':'')+' onchange="toggleOtherBarrier(this.checked)" style="margin-right:8px;margin-top:4px"><div style="flex:1"><strong>อื่นๆ (ระบุ)</strong>';
    html+='<input type="text" id="otherBarrierInput" placeholder="ระบุด่านกั้นอื่นๆ..." value="'+currentFactorData.otherBarrier+'" oninput="currentFactorData.otherBarrier=this.value" style="margin-top:8px;width:100%"'+(currentFactorData.otherBarrier?'':' disabled')+' /></div></label>';
    html+='</div></div></div>';
    
    html+='<div class="form-group"><label>5️⃣ มาตรการแก้ไข</label><textarea id="factorSolution" rows="3" placeholder="ระบุมาตรการหรือแนวทางแก้ไข..."></textarea></div>';
  }
  
  html+='<div class="btn-group"><button class="btn btn-purple" onclick="saveFactorData()">💾 บันทึก</button>';
  html+='<button class="btn" onclick="closeAllForms()">ยกเลิก</button></div></div>';
  
  document.getElementById('formContainer').innerHTML=html;
  document.getElementById('overlay').classList.remove('hidden');
}

function selectFactorTier(tier){currentFactorData.tier=tier;currentFactorData.group=0;currentFactorData.cause=0;currentFactorData.barriers=[];renderFactorForm();}
function selectFactorGroup(group){currentFactorData.group=group;currentFactorData.cause=0;currentFactorData.barriers=[];renderFactorForm();}
function selectFactorCause(cause){
  currentFactorData.cause=cause;
  currentFactorData.barriers=[];
  if(cause==='other'){
    setTimeout(function(){document.getElementById('otherCauseInput').disabled=false;},100);
  }
  renderFactorForm();
}
function toggleBarrier(barrier){
  var idx=currentFactorData.barriers.indexOf(barrier);
  if(idx>-1)currentFactorData.barriers.splice(idx,1);
  else currentFactorData.barriers.push(barrier);
  renderFactorForm();
}
function toggleOtherBarrier(checked){
  if(!checked)currentFactorData.otherBarrier='';
  setTimeout(function(){
    var el=document.getElementById('otherBarrierInput');
    if(el)el.disabled=!checked;
  },100);
}

function saveFactorData(){
  if(!currentFactorData.tier){alert('กรุณาเลือก Tier');return;}
  if(!currentFactorData.group){alert('กรุณาเลือกกลุ่มสาเหตุ');return;}
  if(!currentFactorData.cause){alert('กรุณาเลือกสาเหตุ');return;}
  
  var causeName='';
  if(currentFactorData.cause==='other'){
    if(!currentFactorData.otherCause){alert('กรุณาระบุสาเหตุอื่นๆ');return;}
    causeName='อื่นๆ: '+currentFactorData.otherCause;
  }else{
    var c=rcaDatabase.causes.find(function(x){return x.id===currentFactorData.cause});
    causeName=c?c.thai:'';
  }
  
  var barriers=currentFactorData.barriers.slice();
  if(currentFactorData.otherBarrier){
    barriers.push('อื่นๆ: '+currentFactorData.otherBarrier);
  }
  
  var solution=document.getElementById('factorSolution')?document.getElementById('factorSolution').value:'';
  
  data.flows[currentFactorData.flowIdx].acts[currentFactorData.actIdx].factors.push({
    tier:currentFactorData.tier,
    cause:causeName,
    barriers:barriers,
    solution:solution
  });
  
  closeAllForms();
  renderFlows();
}

function deleteFlow(idx) {
  if (confirm('ลบ Flow นี้?')) {
    data.flows.splice(idx, 1);
    renderFlows();
  }
}

function deleteAct(flowIdx, actIdx) {
  if (confirm('ลบ Unsafe Act นี้?')) {
    data.flows[flowIdx].acts.splice(actIdx, 1);
    renderFlows();
  }
}

function deleteFactor(flowIdx, actIdx, factorIdx) {
  if (confirm('ลบปัจจัยนี้?')) {
    data.flows[flowIdx].acts[actIdx].factors.splice(factorIdx, 1);
    renderFlows();
  }
}

function exportExcel() {
  var csv = '\uFEFF';
  csv += 'Flow,Unsafe Act,Tier,สาเหตุ,ด่านกั้น,มาตรการ\n';
  for (var i = 0; i < data.flows.length; i++) {
    for (var j = 0; j < data.flows[i].acts.length; j++) {
      for (var k = 0; k < data.flows[i].acts[j].factors.length; k++) {
        var f = data.flows[i].acts[j].factors[k];
        csv += '"' + data.flows[i].name + '","' + data.flows[i].acts[j].name + '",Tier ' + f.tier + ',"' + f.cause + '","' + (f.barriers || []).join('; ') + '","' + (f.solution || '') + '"\n';
      }
    }
  }
  var blob = new Blob([csv], {type: 'text/csv;charset=utf-8;'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'RCA_Export.csv';
  a.click();
}

function exportHTML() {
  var html = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>RCA Report</title><style>body{font-family:Arial;padding:40px;background:#f5f5f5}.container{max-width:1000px;margin:0 auto;background:white;padding:30px;border-radius:8px}h1{color:#1e40af}</style></head><body><div class="container"><h1>RCA Report</h1><p><strong>เลขที่:</strong> ' + document.getElementById('incidentNumber').value + '</p><p><strong>รายการความเสี่ยง:</strong> ' + document.getElementById('riskDescription').value + '</p><hr>';
  for (var i = 0; i < data.flows.length; i++) {
    html += '<h2>Flow ' + (i+1) + ': ' + data.flows[i].name + '</h2>';
    for (var j = 0; j < data.flows[i].acts.length; j++) {
      html += '<h3>Unsafe Act ' + (j+1) + ': ' + data.flows[i].acts[j].name + '</h3>';
      for (var k = 0; k < data.flows[i].acts[j].factors.length; k++) {
        var f = data.flows[i].acts[j].factors[k];
        html += '<p><strong>Tier ' + f.tier + ':</strong> ' + f.cause + '</p>';
      }
    }
  }
  html += '</div></body></html>';
  var blob = new Blob([html], {type: 'text/html'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'RCA_Report.html';
  a.click();
}

function visualizeDiagram() {
  var win = window.open('', 'Diagram', 'width=1400,height=900');
  var html = `
  <!DOCTYPE html><html><head><meta charset="UTF-8">
  <title>2-Axis RCA Diagram</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #f5f5f5; }
    .flows { display: flex; gap: 30px; }
    .flow { min-width: 250px; background: #eff6ff; padding: 20px; border-radius: 8px; }
    .flow-title { background: #3b82f6; color: white; padding: 12px; border-radius: 6px;
                  margin-bottom: 16px; text-align: center; font-weight: bold; }
    .act { background: #fef3c7; border: 2px solid #f59e0b; padding: 12px; margin: 12px 0;
           border-radius: 6px; }
    .factor { background: white; border: 1px solid #ddd; padding: 8px; margin: 8px 0;
              border-radius: 4px; font-size: 12px; }

    .tier-1 { border-left: 4px solid #3b82f6; }
    .tier-2 { border-left: 4px solid #10b981; }
    .tier-3 { border-left: 4px solid #f59e0b; }
    .tier-4 { border-left: 4px solid #ef4444; }
  </style></head><body>
  <h1>2-Axis RCA Diagram</h1>
  <div class="flows">
  `;

  for (var i = 0; i < data.flows.length; i++) {
    html += `<div class="flow"><div class="flow-title">Flow of Step ${i+1}<br>${data.flows[i].name}</div>`;

    for (var j = 0; j < data.flows[i].acts.length; j++) {
      var act = data.flows[i].acts[j];

      // ⬇⬇⬇ **เรียงลำดับ tier จากล่าง → บน** (1 ล่างสุด → 4 บนสุด)
      var sortedFactors = act.factors
        .slice()
        .sort((a, b) => a.tier - b.tier)  
        .reverse(); // ทำให้ Tier 4 อยู่บนสุด

      html += `<div class="act"><strong>Unsafe Act ${j+1}</strong><br>${act.name}`;

      for (var k = 0; k < sortedFactors.length; k++) {
        var f = sortedFactors[k];
        html += `<div class="factor tier-${f.tier}">
                   <strong>T${f.tier}:</strong> ${f.cause}
                 </div>`;
      }

      html += `</div>`;
    }

    html += `</div>`;
  }

  html += `</div></body></html>`;
  win.document.write(html);
  win.document.close();
}
